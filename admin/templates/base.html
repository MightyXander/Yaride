<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Yaride Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
{% if admin %}
<header class="topbar">
    <nav class="nav">
        <a class="brand" href="/">Yaride Admin</a>
        <a class="{{ 'on' if active == 'dashboard' }}" href="/">Сводка</a>
        <a class="{{ 'on' if active == 'trips' }}" href="/trips">Поездки</a>
        <a class="{{ 'on' if active == 'bookings' }}" href="/bookings">Брони</a>
        <a class="{{ 'on' if active == 'users' }}" href="/users">Пользователи</a>
        <a class="{{ 'on' if active == 'drivers' }}" href="/drivers/pending">Водители</a>
        <a class="{{ 'on' if active == 'ratings' }}" href="/ratings">Оценки</a>
        <a class="{{ 'on' if active == 'points' }}" href="/points">Точки</a>
        <a class="{{ 'on' if active == 'audit' }}" href="/audit">Аудит</a>
    </nav>
    <div class="user">
        <span>{{ admin }}</span>
        <a href="/logout">Выйти</a>
    </div>
</header>
{% endif %}
<main class="content">
    {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
    {% if msg %}<div class="flash ok">{{ msg }}</div>{% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
